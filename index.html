<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>My App</title>
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.1/build/qrcode.min.js"></script>
    <link rel="icon" href="icon.jpg" type="image/jpeg">
    
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background-color: #373b49;
            color: white;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px 15px 30px;
            justify-content: center;
        }
        .top-header {
            font-size: 20px;
            padding: 15px 0;
            text-align: center;
            width: 100%;
            font-weight: 500;
        }
        .card {
            background-color: white;
            border-radius: 12px;
            width: 100%;
            max-width: 380px;
            color: black;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow: hidden;
            box-shadow: 0 6px 20px rgba(0,0,0,0.3);
        }
        .card-header {
            background-color: #f1b709;
            color: white;
            width: 100%;
            text-align: center;
            padding: 14px 10px;
            font-size: 17px;
            font-weight: bold;
        }
        .datetime {
            font-size: 24px;
            font-weight: bold;
            margin: 22px 0 15px 0;
        }
        .qr-placeholder {
            width: 250px;
            height: 250px;
            margin: 10px 0 20px;
        }
        .refresh-text {
            color: #666;
            font-size: 16px;
            margin-bottom: 15px;
        }
        .timer {
            color: #17b366;
            font-size: 38px;
            font-weight: bold;
            margin-bottom: 28px;
        }
        .footer-text {
            margin-top: 25px;
            text-align: center;
            color: #999;
            font-size: 15px;
            line-height: 1.6;
            max-width: 360px;
        }
    </style>
</head>
<body>

    <div class="top-header">
        V25111604 (Nguyễn Văn Tuấn )
    </div>

    <div class="card">
        <div class="card-header">
            将二维码对准扫描器刷新出场
        </div>
        
        <div class="datetime" id="real-time">--:--:--</div>
        
        <div class="qr-placeholder" id="qrcode"></div>
        
        <div class="refresh-text">
            刷新二维码
        </div>
        
        <div class="timer" id="counter">00:00:19</div>
    </div>

    <div class="footer-text">
        尊敬的员工您好，您已进入企业涉密区域，<br>出于企业安全考虑，您的手机摄像机将被禁止拍摄
    </div>

    <script>
        let secondsCount = 19;

        function getVietnamTime() {
            const now = new Date();
            const vietnamTime = new Date(now.getTime() + 7 * 60 * 60 * 1000);
            
            const year = vietnamTime.getUTCFullYear();
            const month = String(vietnamTime.getUTCMonth() + 1).padStart(2, '0');
            const day = String(vietnamTime.getUTCDate()).padStart(2, '0');
            const hours = String(vietnamTime.getUTCHours()).padStart(2, '0');
            const minutes = String(vietnamTime.getUTCMinutes()).padStart(2, '0');
            const seconds = String(vietnamTime.getUTCSeconds()).padStart(2, '0');
            
            return `${year}-${month}-${day} ${hours}:${minutes}:${seconds}`;
        }

        function generateQRCode() {
            const qrData = 'auth_V25111604_' + Date.now();
            document.getElementById('qrcode').innerHTML = '';
            
            QRCode.toCanvas(document.createElement('canvas'), qrData, {
                width: 250,
                margin: 2,
                color: { dark: '#000000', light: '#ffffff' }
            }, (err, canvas) => {
                if (!err) document.getElementById('qrcode').appendChild(canvas);
            });
        }

        function updateTime() {
            document.getElementById('real-time').textContent = getVietnamTime();
        }

        function updateCounter() {
            secondsCount++;
            if(secondsCount > 59) secondsCount = 0;
            document.getElementById('counter').textContent = 
                `00:00:${String(secondsCount).padStart(2, '0')}`;
        }

        generateQRCode();
        updateTime();
        setInterval(updateTime, 1000);
        setInterval(updateCounter, 1000);
    </script>
</body>
</html>
